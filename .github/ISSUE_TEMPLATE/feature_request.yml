name: Feature request
description: Suggest an enhancement for Distillery
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? Who benefits?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature and how it would behave.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Distillation engine
        - API
        - Worker / queue
        - CLI
        - Observability
        - Documentation
        - Other
