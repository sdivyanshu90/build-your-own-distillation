name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install pip-audit
      - name: Audit
        run: pip-audit --strict --desc || true

  static-analysis:
    name: Static analysis (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "bandit[toml]"
      - run: bandit -c pyproject.toml -r src -ll

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  image-scan:
    name: Image scan (Trivy)
    runs-on: ubuntu-latest
    # Informational scan: findings are uploaded to the Security tab but never
    # fail the workflow (vulnerabilities are triaged there, not in CI), and a
    # transient Trivy DB download issue won't break the build.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f deploy/docker/Dockerfile -t distillery:scan .
      # Use the Trivy CLI directly instead of aquasecurity/trivy-action: that
      # action's tags transitively pin aquasecurity/setup-trivy@v0.2.1, which was
      # removed upstream and breaks action resolution. The official install
      # script + CLI has no such dependency chain.
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
      - name: Trivy scan
        run: |
          trivy image \
            --scanners vuln \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format sarif \
            --output trivy.sarif \
            --exit-code 0 \
            distillery:scan
      - name: Upload SARIF
        if: always() && hashFiles('trivy.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
