# Prometheus scrape configuration for the local Compose stack.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: distillery-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: distillery-api

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
