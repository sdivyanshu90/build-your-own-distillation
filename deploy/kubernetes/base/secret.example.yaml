# TEMPLATE ONLY — do NOT commit real secrets. In production, generate this from
# a secrets manager (AWS Secrets Manager / Vault / Sealed Secrets / External
# Secrets Operator). `kubectl apply` this file only in local/dev clusters.
apiVersion: v1
kind: Secret
metadata:
  name: distillery-secrets
  labels:
    app.kubernetes.io/name: distillery
type: Opaque
stringData:
  DISTILLERY_DATABASE__URL: "postgresql+psycopg://distillery:CHANGE_ME@postgres.distillery.svc.cluster.local:5432/distillery"
  DISTILLERY_SECURITY__JWT_SECRET: "CHANGE_ME_WITH_64_RANDOM_CHARS_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  DISTILLERY_SECURITY__BOOTSTRAP_API_KEYS: ""
  DISTILLERY_LLM__ANTHROPIC_API_KEY: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
