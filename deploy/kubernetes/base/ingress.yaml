apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: distillery
  labels:
    app.kubernetes.io/name: distillery
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["distillery.example.com"]
      secretName: distillery-tls
  rules:
    - host: distillery.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: distillery-api
                port:
                  number: 80
