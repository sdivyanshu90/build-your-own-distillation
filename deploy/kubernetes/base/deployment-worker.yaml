apiVersion: apps/v1
kind: Deployment
metadata:
  name: distillery-worker
  labels:
    app.kubernetes.io/name: distillery
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: distillery
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: distillery
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: distillery
      # Long jobs need a grace period to finish or checkpoint before eviction.
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/uniiq-ai/distillery:latest
          imagePullPolicy: IfNotPresent
          args: ["worker"]
          envFrom:
            - configMapRef:
                name: distillery-config
            - secretRef:
                name: distillery-secrets
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "celery -A distillery.infrastructure.queue.celery_app:celery_app inspect ping -d celery@$HOSTNAME"
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 15
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits: { cpu: "2", memory: "4Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
            - { name: artifacts, mountPath: /app/artifacts }
            - { name: hf-cache, mountPath: /home/distillery/.cache }
      volumes:
        - { name: tmp, emptyDir: {} }
        - { name: artifacts, emptyDir: {} }
        - { name: hf-cache, emptyDir: {} }
