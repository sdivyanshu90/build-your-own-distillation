apiVersion: apps/v1
kind: Deployment
metadata:
  name: distillery-api
  labels:
    app.kubernetes.io/name: distillery
    app.kubernetes.io/component: api
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: distillery
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: distillery
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: distillery
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/uniiq-ai/distillery:latest
          imagePullPolicy: IfNotPresent
          args: ["api"]
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: distillery-config
            - secretRef:
                name: distillery-secrets
          startupProbe:
            httpGet: { path: /health, port: http }
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
            - { name: artifacts, mountPath: /app/artifacts }
            - { name: hf-cache, mountPath: /home/distillery/.cache }
      volumes:
        - { name: tmp, emptyDir: {} }
        - { name: artifacts, emptyDir: {} }
        - { name: hf-cache, emptyDir: {} }
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: api
