# Run database migrations before rolling out a new version. With Argo CD use a
# PreSync hook; with Helm a pre-upgrade hook; with plain kubectl, apply and wait
# for completion before applying the Deployments.
apiVersion: batch/v1
kind: Job
metadata:
  name: distillery-migrate
  labels:
    app.kubernetes.io/name: distillery
    app.kubernetes.io/component: migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: distillery
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      serviceAccountName: distillery
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/uniiq-ai/distillery:latest
          args: ["migrate"]
          envFrom:
            - configMapRef:
                name: distillery-config
            - secretRef:
                name: distillery-secrets
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
