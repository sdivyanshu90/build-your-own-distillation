apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Pin to an immutable release tag in production.
images:
  - name: ghcr.io/uniiq-ai/distillery
    newTag: "1.0.0"

replicas:
  - name: distillery-api
    count: 5
  - name: distillery-worker
    count: 4

patches:
  - path: api-resources.patch.yaml
    target:
      kind: Deployment
      name: distillery-api
  - path: worker-resources.patch.yaml
    target:
      kind: Deployment
      name: distillery-worker
